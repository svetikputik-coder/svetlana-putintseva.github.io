<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GRASS KILLER — Учёт бензокос</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            font-weight: 400;
            background: #f0f7f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 60, 20, 0.15);
            padding: 50px 60px 40px;
            text-align: center;
        }
        .logo h1 {
            font-size: 46px;
            font-weight: 400;
            color: #1f5a2a;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 20px;
            font-weight: 400;
            color: #4e6b50;
            margin-bottom: 30px;
            border-bottom: 2px solid #d4e8d4;
            padding-bottom: 20px;
        }

        .download-text {
            font-size: 18px;
            color: #4e6b50;
            margin-bottom: 20px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin: 30px 0 35px;
            text-align: left;
        }
        .feature-item {
            background: #f5faf5;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 400;
            color: #1f3a22;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #dce8dc;
        }
        .feature-item span {
            font-size: 22px;
        }

        /* ===== КАРТИНКИ-КНОПКИ ===== */
        .download-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin: 30px 0 35px;
        }
        .btn-image {
            display: inline-block;
            border-radius: 20px;
            overflow: hidden;
            transition: 0.25s;
            cursor: pointer;
            border: 3px solid transparent;
            max-width: 320px;
            width: 100%;
            text-decoration: none;
        }
        .btn-image:hover {
            transform: scale(1.03);
            border-color: #4CAF50;
            box-shadow: 0 8px 28px rgba(76, 175, 80, 0.3);
        }
        .btn-image img {
            width: 100%;
            height: auto;
            display: block;
        }
        .btn-image .label {
            display: block;
            padding: 12px 0 16px;
            font-size: 18px;
            font-weight: 400;
            color: #1f3a22;
            background: #f5faf5;
            text-align: center;
            border-top: 1px solid #e0ece0;
        }

        .qr-block {
            margin: 25px 0 30px;
        }
        .qr-block p {
            font-size: 16px;
            font-weight: 400;
            color: #3b5a3b;
            margin-bottom: 8px;
        }
        .qr-block img {
            width: 160px;
            height: 160px;
            border-radius: 16px;
            border: 2px solid #bcd9bc;
            background: #fff;
            padding: 8px;
        }

        /* ===== КАРТИНКА ВНИЗУ ===== */
        .bottom-image {
            margin-top: 30px;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
        }
        .bottom-image img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 16px;
        }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #e4efe4;
            font-size: 15px;
            font-weight: 400;
            color: #5b735b;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .footer a {
            color: #2b6b2b;
            text-decoration: none;
            font-weight: 400;
        }
        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 700px) {
            .container {
                padding: 30px 20px;
                border-radius: 24px;
            }
            .logo h1 {
                font-size: 32px;
            }
            .btn-image {
                max-width: 280px;
            }
            .features-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        @media (max-width: 480px) {
            .features-grid {
                grid-template-columns: 1fr;
            }
            .logo h1 {
                font-size: 26px;
            }
            .btn-image {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="logo">
        <h1>GRASS KILLER</h1>
    </div>
    <div class="subtitle">Учёт бензокос</div>

    <p class="download-text">Выберите версию для скачивания:</p>

    <!-- ===== КАРТИНКИ-КНОПКИ ===== -->
    <div class="download-buttons">
        <a href="Release.zip" class="btn-image">
            <img src="assets/desktop_preview.png" alt="Скачать для Windows" />
            <span class="label">Скачать .zip</span>
        </a>
        <a href="app-debug.apk" class="btn-image">
            <img src="assets/mobile_preview.png" alt="Скачать для Android" />
            <span class="label">Скачать .apk</span>
        </a>
    </div>

    <div class="footer">
        <span>© 2026 Путинцева С.А. · Группа ИС-941 · КемГУ</span>
    </div>

</div>

</body>
</html>
